<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LLSC Training Organizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-brand">
    <img src="logo.png" alt="LLSC" class="nav-logo">
  </div>
  <button id="navImport" class="active" onclick="showScreen('import')">Übungen</button>
  <button id="navPlanner" disabled onclick="showScreen('planner')">Setup</button>
  <button id="navTraining" disabled onclick="showScreen('training')">Training</button>
  <button id="navStats" onclick="showScreen('stats')">Statistik</button>
</nav>

<!-- ==================== IMPORT ==================== -->
<div id="screen-import" class="screen active">
  <h2 style="margin-bottom:12px;">Übungen</h2>

  <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="openExerciseForm()">Neue Übung</button>
  <div style="display:flex;justify-content:flex-end;align-items:flex-start;gap:6px;margin-bottom:16px">
    <button class="btn-icon" onclick="showImportHelp()" title="Hilfe zum CSV-Import">i</button>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-outline btn-sm" style="padding-left:20px;padding-right:20px" onclick="showImportDialog()">Importieren</button>
      <button class="btn btn-outline btn-sm" id="actionRow" style="display:none;padding-left:20px;padding-right:20px" onclick="showExportDialog()">Exportieren</button>
    </div>
  </div>

  <input type="file" id="csvFileInput" multiple accept=".csv,.jpg,.jpeg,.png,.webp" style="display:none">
  <input type="file" id="folderInput" webkitdirectory style="display:none">

  <div id="importFilterSection" style="display:none">
    <div id="importFilterChips"></div>
    <div style="margin-top:12px">
      <input type="text" id="importSearch" placeholder="Übung suchen…" oninput="onImportSearch(this.value)"
        style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;">
    </div>
    <div style="border-top:1px solid var(--border);margin-top:16px"></div>
  </div>

  <div id="importedList" class="exercise-list"></div>
</div>

<!-- ==================== EXERCISE FORM MODAL ==================== -->
<div class="form-overlay" id="formOverlay" style="display:none" onclick="handleFormOverlayClick(event)">
  <div class="form-dialog">
    <div class="form-dialog-header">
      <h3 id="formTitle">Übung hinzufügen</h3>
      <button class="form-close-btn" onclick="closeExerciseForm()" type="button">&times;</button>
    </div>
    <input type="hidden" id="editId" value="">
    <div class="form-row">
      <label>Name *</label>
      <input type="text" id="addName" placeholder="z.B. Liegestütze">
    </div>
    <div class="form-row">
      <label>Beschreibung</label>
      <textarea id="addDesc" placeholder="Optional"></textarea>
    </div>
    <div class="form-row">
      <label>Modus</label>
      <select id="addMode">
        <option value="no_switch">Kein Wechsel</option>
        <option value="switch_per_exercise">Seitenwechsel pro Übung</option>
        <option value="switch_per_station">Seitenwechsel pro Station</option>
      </select>
    </div>
    <div class="form-row">
      <label>Tools</label>
      <input type="text" id="addTools" placeholder="z.B. Terraband, Kettlebell">
    </div>
    <div class="form-row">
      <label>Muskelgruppe</label>
      <input type="text" id="addMuscle" placeholder="z.B. Schulter, Brust">
    </div>
    <div class="form-row">
      <label>Bild</label>
      <div class="image-upload-area">
        <div id="imagePreview" class="image-preview" style="display:none">
          <img id="imagePreviewImg" src="">
          <button class="img-remove-btn" onclick="removeFormImage()" type="button">&times;</button>
        </div>
        <div id="imageUploadBtns" class="image-upload-btns">
          <label class="btn btn-outline btn-sm" style="width:auto;cursor:pointer">
            Datei wählen
            <input type="file" id="addImage" accept="image/*" style="display:none" onchange="handleImageSelect(this)">
          </label>
          <label class="btn btn-outline btn-sm camera-btn" style="width:auto;cursor:pointer">
            Kamera
            <input type="file" id="addImageCamera" accept="image/*" capture="environment" style="display:none" onchange="handleImageSelect(this)">
          </label>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:12px">
      <button class="btn btn-success" id="formSubmitBtn" onclick="submitExerciseForm()">Hinzufügen</button>
      <button class="btn btn-outline" onclick="closeExerciseForm()">Abbrechen</button>
    </div>
  </div>
</div>

<!-- ==================== PLANNER ==================== -->
<div id="screen-planner" class="screen">
  <div class="planner-header">
    <h2>Workout planen</h2>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="plannerTimeEstimate" style="font-size:13px;color:var(--text-light)"></span>
      <button class="btn btn-outline btn-sm" onclick="exportStationSheets()">Drucken</button>
    </div>
  </div>

  <div class="settings-panel">
    <h3>Timing (Sekunden)</h3>
    <div class="setting-row">
      <label>Trainingszeit</label>
      <input type="number" id="settingWork" value="45" min="5" max="300" onchange="handleSettingChange()">
    </div>
    <div class="setting-row">
      <label>Kurze Pause</label>
      <input type="number" id="settingShortBreak" value="15" min="5" max="120" onchange="handleSettingChange()">
    </div>
    <div class="setting-row">
      <label>Stationswechsel</label>
      <input type="number" id="settingLongBreak" value="60" min="10" max="300" onchange="handleSettingChange()">
    </div>
    <div class="setting-row">
      <label>Anzahl Stationen</label>
      <input type="number" id="settingStops" value="11" min="1" max="20" onchange="handleStopsChange(this)">
    </div>
  </div>

  <div class="planner-layout">
    <div class="planner-sidebar">
      <div class="legends" id="legends"></div>
    </div>

    <div class="planner-main">
      <p class="planner-hint-desktop" style="font-size:13px;color:var(--text-light);margin-bottom:8px;">
        Übung antippen, dann Slot antippen zum Zuweisen.
      </p>
      <p class="planner-hint-mobile" style="font-size:13px;color:var(--text-light);margin-bottom:8px;display:none">
        Slot antippen zum Belegen.
      </p>

      <div class="planner-columns">
        <div class="planner-col-pool">
          <div style="display:flex;gap:6px;margin-bottom:10px">
            <button class="btn btn-outline btn-sm" onclick="addAllExercises()">Alle hinzufügen</button>
          </div>
          <div class="exercise-pool" id="exercisePool"></div>
        </div>

        <div class="planner-col-stations">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <button class="btn btn-outline btn-sm" onclick="clearPlan()">Stationen zurücksetzen</button>
            <button class="btn btn-outline btn-sm" onclick="saveFavouriteToFile()">Als Favorit speichern</button>
            <button class="btn btn-outline btn-sm" onclick="loadFavouriteFromFile()">Favorit laden</button>
          </div>
          <div class="stops-grid" id="stopsGrid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ==================== TRAINING ==================== -->
<div id="screen-training" class="screen">
  <div id="trainingContent"></div>
</div>

<!-- ==================== STATS ==================== -->
<div id="screen-stats" class="screen screen-stats">
  <h2 style="margin-bottom:16px">Statistik</h2>
  <div id="historyContent"></div>
</div>

<div id="mobilePicker" class="mobile-picker">
  <div class="mobile-picker-header">
    <span id="mobilePickerTitle">Übung wählen</span>
    <button class="form-close-btn" onclick="closeMobilePicker()" type="button">&times;</button>
  </div>
  <div class="mobile-picker-body">
    <div id="mobilePickerFilters"></div>
    <input type="text" id="mobilePickerSearch" placeholder="Übung suchen…"
      oninput="onPickerSearch(this.value)"
      style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;flex-shrink:0">
    <div id="mobilePickerList"></div>
  </div>
</div>

<div id="selectionBar" class="selection-bar">
  <span id="selectionBarName" class="selection-bar-name"></span>
  <button class="btn selection-bar-btn" onclick="addToNextFreeSlot(selectedExerciseId)">+ Nächster freier Slot</button>
</div>

<script src="utils.js"></script>
<script src="data.js"></script>
<script src="planner.js"></script>
<script src="training.js"></script>
<script src="favourites.js"></script>
<script src="history.js"></script>
<script src="app.js"></script>
</body>
</html>
